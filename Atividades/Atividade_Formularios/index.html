<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <main>
        <h1>Cadastro de Aluno - DSM</h1>
        <p>Cadastro de alunos por meio de formulários</p>
        
        <form action="#" method="POST">
            <fieldset>
                <legend>Dados Pessoais</legend>
                <label for="nome">Digite o nome:</label>
                <input type="text" name="nome" id="nome" required>
                <label for="email">Digite o email:</label>
                <input type="email" name="email" id="email" required>
                <label for="datanasc">Insira a data de nascimento: </label>
                <input type="date" name="datanasc" id="datanasc">
            </fieldset>
            <br>
            <fieldset>
                <legend>Dados Acadêmicos</legend>
                <label for="curso">Curso:</label>
                <select name="curso" id="curso">
                        <option value="dsm">DSM</option>
                        <option value="ads">ADS</option>
                        <option value="outro">Outro</option>
                    </select>
                    <br>
                    <label for="periodo">Período:</label><br>
                    <input type="radio" name="periodo" id="masc"> Manhã
                    <input type="radio" name="periodo" id="fem">Noite
            </fieldset> <br>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </form>
    </main>
</body>
</html>
